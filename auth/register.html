<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare - Buat Akun</title>
    <link rel="stylesheet" href="../assets/css/auth/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="desktop-wrapper">
        <a href="../indeks.html" class="back-link">Kembali ke Homepage</a> 
        <div class="main-card">

            <div class="brand-side">
                
                <div class="illustration-grid">
                    <div class="illus-item">
                        <img src="../assets/image/Gambar konseling 4.PNG" alt="Gitaris">
                    </div>
                    <div class="illus-item">
                        <img src="../assets/image/Arifinzainal1728 Author Portfolio _ Freepik.jpg" alt="Menyapa">
                    </div>
                    <div class="illus-item">
                        <img src="../assets/image/Gambar konseling 3.jpg" alt="Pelajar">
                    </div>
                    <div class="illus-item">
                        <img src="../assets/image/contento negocio mujer señalando mano arriba y brillante ligero bulbo apareciendo en el pensamiento burbuja_ idea y innovación concepto.jpg" alt="Pelukis">
                    </div>
                </div>
            </div>

            <div class="action-side">
                <div class="form-wrapper">
                    <h2 class="welcome-msg">Buat Akun</h2>
                    <p class="subtitle">Silakan isi informasi di bawah untuk membuat akun kamu</p>

                    <form>
                        <div class="input-group">
                            <label for="name">Nama Lengkap</label>
                            <input type="text" id="name" placeholder="Masukkan Nama Lengkap Kamu...">
                        </div>

                        <div class="input-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Masukkan Nama Email Kamu...">
                        </div>

                        <div class="input-group">
                            <label for="password">Kata Sandi</label>
                            <input type="password" id="password" placeholder="Masukkan Kata Sandi Kamu...">
                        </div>

                        <button type="submit" class="btn-submit">Daftar</button>
                    </form>

                    <p class="footer-text">Sudah mempunyai akun? <a href="Login.html">Masuk</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
