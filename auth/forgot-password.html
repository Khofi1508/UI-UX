<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare - Lupa Password</title>
    <link rel="stylesheet" href="../assets/css/auth/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="desktop-wrapper">
        <a href="Login.html" class="back-link">← Kembali ke Login</a> 
        <div class="main-card">
            
            <div class="brand-side">
                <div class="logo-wrapper">
                    <img src="../assets/image/ChatGPT_Image_Feb_21__2026__02_49_09_PM-removebg-preview 1.png" alt="Logo MindCare" class="brand-logo" onerror="this.style.display='none'">
                </div>
                <div class="brand-text">
                    <h2>Atur Ulang Sandi.</h2>
                    <p>Jangan khawatir, kami akan membantu memulihkan akses akun MindCare Anda dengan aman.</p>
                </div>
            </div>

            <div class="action-side">
                <div class="content-right" id="forgotContainer">
                    <h2 class="welcome-msg">Lupa Password?</h2>
                    <p class="instruction">Masukkan email terdaftar Anda untuk menerima tautan pemulihan.</p>
                    
                    <form id="forgotForm" onsubmit="handleForgotPassword(event)">
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label for="resetEmail" style="display: block; font-size: 13px; margin-bottom: 8px; color: #64748b; font-weight: 500;">Alamat Email</label>
                            <input type="email" id="resetEmail" required placeholder="contoh@email.com" 
                                   style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s;">
                        </div>

                        <button type="submit" class="btn btn-white" style="width: 100%; border: none; background: #4caf50; color: white; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;">
                            Kirim Tautan Pemulihan
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        function handleForgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById('resetEmail').value;

            if (email) {
                // Menghapus form input dan menggantinya dengan template sukses/notifikasi
                const container = document.getElementById('forgotContainer');
                container.innerHTML = `
                    <div style="text-align: center; padding: 20px 0; animation: fadeIn 0.4s ease-out;">
                        <div style="font-size: 50px; margin-bottom: 15px;">✉️</div>
                        <h2 class="welcome-msg" style="font-size: 22px; color: #2c3e50;">Periksa Email Anda</h2>
                        <p class="instruction" style="margin-bottom: 25px; font-size: 14px; color: #64748b; line-height: 1.6;">
                            Kami telah mengirimkan instruksi beserta tautan perubahan password ke <strong style="color: #2d4f54;">${email}</strong>.
                        </p>
                        <a href="Login.html" class="btn btn-white" style="display: inline-block; text-decoration: none; background: #4caf50; color: white; padding: 10px 24px; border-radius: 8px; font-weight: 600; font-size: 14px;">
                            Kembali ke Login
                        </a>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
